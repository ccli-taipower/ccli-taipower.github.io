<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>曲目 · BravoRadio</title>
  <meta name="description" content="BRAVO FM 91.3 · 用 BravoRadio App 收聽此曲目">
  <meta property="og:title" content="BravoRadio · 曲目分享">
  <meta property="og:description" content="BRAVO FM 91.3 · 用 BravoRadio App 收聽此曲目">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="masthead">
    <span class="bar"></span>
    <span class="eyebrow">BRAVO · FM 91.3 · 曲目分享</span>
  </div>

  <main class="card">
    <div class="type-label">EPISODE · 集數</div>
    <h1 class="title" id="itemName">正在載入…</h1>
    <p class="meta"><strong>節目</strong> <span id="itemProgram"></span></p>
    <p class="meta"><strong>長度</strong> <span id="itemDuration"></span></p>

    <div id="audioPlayer"></div>

    <div class="hairline"></div>

    <div class="cta-group">
      <a id="openInAppBtn" class="btn btn-primary">在 App 中開啟</a>
      <a id="downloadBtn" class="btn btn-disabled">App 即將上架</a>
    </div>
  </main>

  <div class="footer">
    BRAVO RADIO <span class="divider"></span> ESTABLISHED 91.3 MHz
  </div>

  <script src="/assets/landing.js"></script>
  <script>BravoLanding.init("episode");</script>
</body>
</html>
